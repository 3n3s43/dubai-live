<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Mode 1" />
  <meta name="theme-color" content="#000000" />
  <link rel="icon" type="image/png" href="image/tiktokicon.png" />
  <link rel="apple-touch-icon" href="image/tiktokicon.png" />
  <link rel="manifest" href="manifest-mode1.json" />
  <title>Mode 1 – Host</title>
  <style>
    @font-face {
      font-family: "TikTok Sans";
      src: url("TikTok_Sans/static/TikTokSans-Regular.ttf") format("truetype");
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: "TikTok Sans Medium";
      src: url("TikTok_Sans/static/TikTokSans-Medium.ttf") format("truetype");
      font-weight: 500;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: "TikTok Sans SemiBold";
      src: url("TikTok_Sans/static/TikTokSans-SemiBold.ttf") format("truetype");
      font-weight: 600;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: "TikTok Sans Bold";
      src: url("TikTok_Sans/static/TikTokSans-Bold.ttf") format("truetype");
      font-weight: 700;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: "TikTok Sans Condensed";
      src: url("TikTok_Sans/static/TikTokSans_Condensed-Regular.ttf") format("truetype");
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: "TikTok Sans Expanded";
      src: url("TikTok_Sans/static/TikTokSans_Expanded-Regular.ttf") format("truetype");
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }
    :root {
      color-scheme: dark light;
      --bg: #000;
      --web-bg-image: url("image/sea.webp");
      --muted: #8b93a6;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background-color: var(--bg);
      background-image: var(--web-bg-image);
      background-position: center;
      background-size: cover;
      background-repeat: no-repeat;
      color: #fff;
      font-family: "TikTok Sans", "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      min-height: 100vh;
    }
    body.transparent-bg,
    body.transparent-bg .host-layout {
      background: transparent !important;
    }
    .host-layout {
      position: relative;
      min-height: 100vh;
      width: 100%;
      overflow: hidden;
      background-color: transparent;
    }
    .video-wrap,
    .room-panel,
    .animation-box {
      position: absolute;
      background: #0b0d10;
      border: none;
      border-radius: 0;
      box-shadow: 0 10px 30px rgba(0,0,0,0.35);
      overflow: hidden;
      touch-action: none;
    }
    .firework-box {
      background: transparent;
      border: 1px solid transparent;
      box-shadow: none;
      overflow: visible;
      pointer-events: none;
    }
    .cam-bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
      z-index: 0;
    }
    .cam-tools {
      position: fixed;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 999;
      display: none;
      flex-direction: row;
      flex-wrap: wrap;
      gap: 6px;
      padding: 8px;
      background: rgba(15, 17, 21, 0.85);
      border: 1px solid #232836;
      border-radius: 10px;
    }
    .cam-tools.show { display: flex; }
    .cam-tools button {
      border: 1px solid #232836;
      background: rgba(22, 26, 33, 0.9);
      color: #e8ecf2;
      padding: 6px 10px;
      border-radius: 10px;
      font-family: "TikTok Sans", "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      font-size: 12px;
      cursor: pointer;
    }
    .cam-tools button.active {
      border-color: #5dd1ff;
      box-shadow: 0 6px 18px rgba(93, 209, 255, 0.2);
    }
    .cam-ai-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: none;
      z-index: 2;
      pointer-events: none;
    }
    .cam-vrm-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: none;
      z-index: 2;
      pointer-events: none;
      background: transparent;
    }
    .cam-seg-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: none;
      z-index: 1;
      pointer-events: none;
    }
    .animation-box {
      background: transparent;
      border: 2px dashed #ff9a3c;
      box-shadow: none;
      overflow: visible;
      isolation: auto;
    }
    .video-wrap { background: #000; }
    .video-wrap.cam-speaking {
      box-shadow: inset 0 0 0 2px #37d9ff, 0 0 18px rgba(55, 217, 255, 0.45);
      border-radius: var(--speaking-border-radius, 10px);
    }
    .video-wrap.cam-hidden {
      background: transparent;
    }
    .video-wrap.cam-hidden video,
    .video-wrap.cam-hidden .cam-bg,
    .video-wrap.cam-hidden .cam-seg-canvas,
    .video-wrap.cam-hidden .cam-ai-canvas,
    .video-wrap.cam-hidden .cam-vrm-canvas {
      display: none !important;
      opacity: 0 !important;
    }
    .room-panel {
      padding: 0;
      display: none;
      background: transparent;
      border: none !important;
      outline: none !important;
      box-shadow: none !important;
    }
    .room-panel.show { display: block; }
    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      background: transparent;
      pointer-events: none;
      position: relative;
      z-index: 1;
    }
    video.cam-ai-face {
      filter: saturate(1.25) contrast(1.06) brightness(1.05) blur(0.4px);
    }
    .room-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 0;
    }
    .slot {
      border: none;
      border-radius: 0;
      min-height: 120px;
      background: #14171c;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 6px;
      text-align: center;
      position: relative;
      overflow: hidden;
      isolation: isolate;
    }
    .slot-bg {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }
    .slot-bg img {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 200%;
      height: 200%;
      object-fit: cover;
      filter: blur(14px) saturate(1.4) brightness(0.65);
    }
    .slot > *:not(.slot-bg):not(.seat-pill):not(.seat-mute):not(.slot-avatar):not(.seat-lion-icon) { position: relative; z-index: 1; }
    .slot .plus { font-size: 36px; line-height: 1; color: #b3b3b3; }
    .slot .label { color: #b3b3b3; font-size: 14px; font-weight: 700; }
    .resize-handle { display: none; }
    .slot-avatar { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; background: transparent; border: none; box-shadow: none; }
    .slot.occupied .slot-avatar {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }
    .seat-pill {
      position: absolute;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 2px;
      height: 20px;
      padding: 0 6px;
      background: rgba(45, 49, 57, 0.92);
      border-radius: 999px;
      font-size: 11px;
      font-family: "TikTok Sans", "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      color: #e8ecf2;
      white-space: nowrap;
      z-index: 6;
    }
    .seat-pill-top { top: 4px; left: 4px; padding-left: 2px; }
    .host-pill {
      z-index: 4;
      min-width: 48px;
      padding: 0 10px;
      justify-content: center;
      text-align: center;
    }
    .cam-name-pill {
      z-index: 4;
      min-width: 48px;
      padding: 0 10px;
      justify-content: center;
      text-align: center;
    }
    .cam-name-pill.no-capsule {
      background: transparent;
    }
    .seat-pill-bottom.cam-name-pill {
      padding-left: 10px;
      padding-right: 10px;
    }
    .seat-pill-bottom { bottom: 4px; left: 4px; padding-right: 2px; }
    .seat-pill-icon { width: 16px; height: 24px; display: block; }
    .seat-name-text { font-weight: 400; font-size: 10px; line-height: 16px; }
    .seat-lion-icon {
      position: absolute;
      top: 4px;
      right: 4px;
      left: auto;
      bottom: auto;
      display: none;
      width: 24px;
      height: 24px;
      opacity: 0;
      transform: scale(1);
      z-index: 3;
      pointer-events: none;
    }
    .seat-lion-icon.seat-lion-show {
      display: block;
      animation: seatLionFlash 4s ease-in-out;
    }
    @keyframes seatLionFlash {
      0% { opacity: 0; transform: scale(1); }
      10% { opacity: 1; transform: scale(1); }
      75% { opacity: 1; transform: scale(1); }
      100% { opacity: 0; transform: scale(1); }
    }
    .seat-points-wrap {
      overflow: hidden;
      height: 16px;
      display: inline-block;
      position: relative;
      vertical-align: middle;
    }
    .seat-points-text {
      display: block;
      line-height: 16px;
      height: 16px;
    }
    .seat-points-roller {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }
    .seat-points-roller > span {
      height: 16px;
      line-height: 16px;
      display: block;
    }
    .seat-points-roller.rolling {
      animation: seatPointsRoll 0.45s ease-out forwards;
    }
    @keyframes seatPointsRoll {
      0%   { transform: translateY(0); }
      100% { transform: translateY(-50%); }
    }
    .seat-plus-circle {
      width: 16px;
      height: 16px;
    
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background: #464a4f;
      color: #fff;
      font-size: 18px;
      line-height: 16px;
      
    }
    .seat-plus-glyph {
      display: block;
      line-height: 1;
      transform: translate(0.5px, -1px);
    }
    .seat-mute {
      position: absolute;
      right: 2px;
      bottom: 2px;
      width: 16px;
      height: 22px;
      opacity: 0.9;
    }
    .gift-overlay {
      position: absolute;
      z-index: 1;
      pointer-events: none;
      display: none;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: transparent;
      isolation: auto;
    }
    .gift-overlay.show {
      display: block;
    }
    .gift-overlay.lion-upgrade {
      overflow: visible;
    }
    .gift-overlay.lion-upgrade video {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 200%;
      object-fit: fill;
    }
    .gift-overlay.lion-upgrade canvas.gift-canvas {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 200%;
    }
    .gift-overlay.lion-upgrade::before {
      display: none;
    }
    .gift-overlay.android-lion {
      overflow: visible;
    }
    .gift-overlay.android-lion video {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 200%;
      object-fit: fill;
    }
    .gift-overlay.android-lion::before {
      display: none;
    }
    .gift-overlay::before {
      content: '';
      position: absolute;
      top: 20%;
      left: 0;
      right: 0;
      height: 60%;
      background: transparent;
      pointer-events: none;
      z-index: 1;
      mask-image: linear-gradient(to bottom, transparent 0%, black 20%, black 80%, transparent 100%);
      -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 20%, black 80%, transparent 100%);
    }
    .gift-overlay video {
      width: 100%;
      height: 100%;
      object-fit: fill;
      display: block;
      background: transparent;
      opacity: 0;
      -webkit-user-select: none;
      user-select: none;
      /* Hide native video controls so there's no download button */
      pointer-events: none;
      /* GPU compositing for smoother playback on mobile */
      will-change: opacity;
      transform: translateZ(0);
    }
    .gift-overlay video.playing {
      opacity: 1;
    }
    .gift-overlay video.use-canvas {
      position: absolute;
      opacity: 0 !important;
      pointer-events: none;
      width: 1px;
      height: 1px;
    }
    .gift-overlay canvas.gift-canvas {
      width: 100%;
      height: 100%;
      display: block;
      background: transparent;
    }
    .live-firework {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      z-index: 80;
    }
    .live-firework.show { display: flex; }
    .live-firework-core {
      position: relative;
      width: min(14vw, 84px);
      aspect-ratio: 1 / 1;
      border-radius: 999px;
      overflow: hidden;
      border: 2px solid rgba(255, 255, 255, 0.85);
      box-shadow: 0 0 16px rgba(255, 200, 0, 0.4), 0 0 28px rgba(255, 96, 96, 0.3);
      animation: liveFireworkFlight 0.58s ease-out forwards;
      background: rgba(12, 16, 24, 0.96);
      opacity: 1;
      transition: opacity 0.2s ease;
    }
    .live-firework.center-hidden .live-firework-core { opacity: 0; }
    .live-firework-avatar,
    .live-firework-gift {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: opacity 0.2s ease;
    }
    .live-firework-gift {
      opacity: 0;
      object-fit: contain;
      padding: 22%;
    }
    .live-firework-burst {
      position: absolute;
      width: 30px;
      height: 30px;
      border-radius: 999px;
      object-fit: cover;
      background: rgba(12, 16, 24, 0.98);
      border: 2px solid rgba(255, 255, 255, 0.95);
      box-shadow: 0 0 14px rgba(255, 220, 120, 0.62);
      transform: translate(var(--fx, 0), var(--fy, 0)) scale(0);
      animation: liveBurst 0.56s ease-out forwards;
      animation-delay: var(--delay, 0ms);
      opacity: 0;
    }
    @keyframes liveFireworkFlight {
      0% { transform: translate(var(--origin-x, 0px), calc(var(--origin-y, 0px) + 120px)) scale(0.28); opacity: 0; }
      25% { opacity: 1; }
      100% { transform: translate(var(--origin-x, 0px), calc(var(--origin-y, 0px) - 14px)) scale(0.9); opacity: 1; }
    }
    @keyframes liveBurst {
      0% { transform: translate(var(--origin-x, 0px), var(--origin-y, 0px)) scale(0.1); opacity: 0.95; }
      100% { transform: translate(calc(var(--origin-x, 0px) + var(--fx, 0px)), calc(var(--origin-y, 0px) + var(--fy, 0px))) scale(1.5); opacity: 0; }
    }
    .sound-prompt {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.55);
      z-index: 2000;
    }

    /* ── Seat Style 2: single-column with same slot design ── */
    .room-panel.style2-active {
      border: none;
      box-shadow: none;
    }
    .style2-request-header {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 36px;
      padding: 6px 16px;
      border: none;
      border-radius: 0;
      background: rgba(128,128,128,0.50);
      color: #e8ecf2;
      font-size: 14px;
      font-weight: 700;
      font-family: "TikTok Sans", "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      margin: 0;
      flex-shrink: 0;
    }
    .sound-prompt.hidden { display: none; }
    .sound-prompt button {
      border: 1px solid #232836;
      background: rgba(22, 26, 33, 0.95);
      color: #e8ecf2;
      padding: 12px 18px;
      border-radius: 12px;
      font-family: "TikTok Sans", "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div id="hostLayout" class="host-layout">
    <div id="camTools" class="cam-tools" aria-hidden="true">
      <button id="camVrmPickBtn" type="button">Choose VRM Avatar</button>
      <button id="camVrmClearBtn" type="button">Remove VRM Avatar</button>
      <button id="camBgBtn" type="button">Choose Cam Background Image</button>
      <button id="camBgClearBtn" type="button">Remove Cam Background</button>
      <button id="webBgBtn" type="button">Choose Web Background Image</button>
      <button id="webBgClearBtn" type="button">Remove Web Background</button>
      <input id="camBgFile" type="file" accept="image/*,.gif,.webp" hidden />
      <input id="webBgFile" type="file" accept="image/*,.gif,.webp" hidden />
      <input id="camVrmFile" type="file" accept=".vrm" hidden />
    </div>
    <div id="videoWrap" class="video-wrap">
      <div id="hostPill" class="seat-pill seat-pill-top host-pill">Host</div>
      <div id="camNamePill" class="seat-pill seat-pill-bottom cam-name-pill no-capsule">Host</div>
      <img id="camBg" class="cam-bg" alt="" />
      <canvas id="camSegCanvas" class="cam-seg-canvas"></canvas>
      <canvas id="camAiCanvas" class="cam-ai-canvas"></canvas>
      <canvas id="camVrmCanvas" class="cam-vrm-canvas"></canvas>
      <video id="camera" autoplay playsinline muted></video>
      <div class="resize-handle" data-target="cam"></div>
    </div>
    <div id="roomPanel" class="room-panel">
      <div id="roomGrid" class="room-grid"></div>
      <div class="resize-handle" data-target="room"></div>
    </div>
    <div id="animationBox" class="animation-box">
      <div id="giftOverlay" class="gift-overlay">
        <video id="giftVideo" playsinline webkit-playsinline preload="auto" x-webkit-airplay="deny"
               controlsList="nodownload nofullscreen noremoteplayback"
               disablePictureInPicture disableRemotePlayback
               oncontextmenu="return false"></video>
      </div>
      <div class="resize-handle" data-target="animation"></div>
    </div>
    <div id="fireworkBox" class="animation-box firework-box">
      <div id="liveFirework" class="live-firework" aria-hidden="true"></div>
      <div class="resize-handle" data-target="firework"></div>
    </div>
  </div>
  <div id="soundPrompt" class="sound-prompt hidden" aria-hidden="true">
    <button id="soundPromptBtn" type="button">Tap to enable sound</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh@0.4/face_mesh.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation@0.1/selfie_segmentation.min.js"></script>
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.module.js",
        "three/examples/jsm/": "https://cdn.jsdelivr.net/npm/three@0.161.0/examples/jsm/"
      }
    }
  </script>
  <script type="module">
    import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.module.js";
    import { GLTFLoader } from "https://cdn.jsdelivr.net/npm/three@0.161.0/examples/jsm/loaders/GLTFLoader.js";
    import { VRMUtils, VRMLoaderPlugin } from "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@2.0.6/lib/three-vrm.module.js";

    const canvas = document.getElementById("camVrmCanvas");
    const video = document.getElementById("camera");
    if (!canvas || !video) {
      window.VRMController = { enable: () => {}, resize: () => {}, load: () => {}, loadFile: () => {}, setPoseStrong: () => {}, setPoseAngle: () => {} };
    } else {
      const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: false });
      const maxPixelRatio = 1.25;
      renderer.setPixelRatio(Math.min(maxPixelRatio, window.devicePixelRatio || 1));
      renderer.setClearColor(0x000000, 0);
      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(35, 1, 0.1, 100);
      camera.position.set(0, 1.4, 2.2);

      const light = new THREE.DirectionalLight(0xffffff, 1.2);
      light.position.set(1, 2, 3);
      scene.add(light);
      scene.add(new THREE.AmbientLight(0xffffff, 0.6));

      const loader = new GLTFLoader();
      loader.register((parser) => new VRMLoaderPlugin(parser));
      let currentVrm = null;
      let currentModel = null;
      let enabled = false;
      let vrmReady = false;
      let poseStrongOverride = null;
      let poseAngleOverride = null;

      function resize() {
        const w = canvas.clientWidth || 1;
        const h = canvas.clientHeight || 1;
        renderer.setSize(w, h, false);
        camera.aspect = w / h;
        camera.updateProjectionMatrix();
      }

      function setBoneRotation(vrm, boneName, x, y, z) {
        const bone = vrm.humanoid?.getNormalizedBoneNode(boneName);
        if (!bone) return;
        bone.rotation.x = x;
        bone.rotation.y = y;
        bone.rotation.z = z;
      }

      function applyIdlePoseFromUpperZ(vrm, upperZ) {
        const baseUpper = 1.3;
        const strongUpper = 2.2;
        const t = Math.max(0, Math.min(1, (upperZ - baseUpper) / (strongUpper - baseUpper)));
        const lowerX = 0.35 + (0.9 - 0.35) * t;
        const lowerZ = 0.05 + (0.15 - 0.05) * t;
        const handZ = 0.05 + (0.1 - 0.05) * t;
        setBoneRotation(vrm, "leftUpperArm", 0, 0, upperZ);
        setBoneRotation(vrm, "rightUpperArm", 0, 0, -upperZ);
        setBoneRotation(vrm, "leftLowerArm", lowerX, 0, lowerZ);
        setBoneRotation(vrm, "rightLowerArm", lowerX, 0, -lowerZ);
        setBoneRotation(vrm, "leftHand", 0, 0, handZ);
        setBoneRotation(vrm, "rightHand", 0, 0, -handZ);
      }

      function applyIdlePose(vrm, strong = false) {
        // Arms slightly down and relaxed (stronger for some VRoid exports)
        const upperZ = typeof poseAngleOverride === "number" ? poseAngleOverride : (strong ? 2.2 : 1.3);

    function openAssetCacheDB() {
      return new Promise((resolve, reject) => {
        const req = indexedDB.open(ASSET_CACHE_DB, ASSET_CACHE_VER);
        req.onupgradeneeded = () => { req.result.createObjectStore(ASSET_CACHE_STORE); };
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
      });
    }
    function getAssetBlob(db, key) {
      return new Promise((resolve, reject) => {
        const tx = db.transaction(ASSET_CACHE_STORE, 'readonly');
        const r = tx.objectStore(ASSET_CACHE_STORE).get(key);
        r.onsuccess = () => resolve(r.result || null);
        r.onerror = () => reject(r.error);
      });
    }
    function saveAssetBlob(db, key, blob) {
      return new Promise((resolve, reject) => {
        const tx = db.transaction(ASSET_CACHE_STORE, 'readwrite');
        tx.objectStore(ASSET_CACHE_STORE).put(blob, key);
        tx.oncomplete = () => resolve();
        tx.onerror = () => reject(tx.error);
      });
    }
    function resolveAssetUrl(url) {

    async function downloadAndCacheAsset(db, url) {
      try {
        const cached = await getAssetBlob(db, url);
        if (cached) {
          assetBlobUrls.set(url, URL.createObjectURL(cached));
          return;
        }
        const isProtected = url.startsWith('/api/protected-media/');
        const resp = await fetch(url, isProtected ? { credentials: 'include' } : {});
        if (!resp.ok) throw new Error(resp.status);
        const blob = await resp.blob();
        await saveAssetBlob(db, url, blob);
        assetBlobUrls.set(url, URL.createObjectURL(blob));
      } catch (err) {
        console.warn('Asset cache miss:', url, err);
      }
    }

          canvas.width = size;
          canvas.height = size;
          const ctx = canvas.getContext("2d");
          if (!ctx) return;
          ctx.drawImage(img, 0, 0, size, size);
          const data = ctx.getImageData(0, 0, size, size).data;
          let r = 0, g = 0, b = 0;
          const pixels = size * size;
          for (let i = 0; i < data.length; i += 4) {
            r += data[i];
            g += data[i + 1];
            b += data[i + 2];
          }
          r = Math.round(r / pixels);
          g = Math.round(g / pixels);
          b = Math.round(b / pixels);
          seatColors[idx] = `rgb(${r}, ${g}, ${b})`;

        [78, 78], [78, -78], [-78, 78], [-78, -78],
      ];

      const waves = [
        { delay: timing.firstBurstDelayMs, mult: 0.72 },
        { delay: timing.firstBurstDelayMs + timing.waveGapMs, mult: 0.92 },
        { delay: timing.firstBurstDelayMs + timing.waveGapMs * 2, mult: 1.12 },
      ];
      waves.forEach((wave, waveIdx) => {
        const particleSrc = waveIdx % 2 === 0 ? giftSrc : avatarSrc;
        const angleJitter = (Math.random() * 360) * (Math.PI / 180);
        const cosA = Math.cos(angleJitter);
        const sinA = Math.sin(angleJitter);

          const b = document.createElement("img");
          b.className = "live-firework-burst";
          b.src = particleSrc;
          b.alt = "";
          const rx = x * cosA - y * sinA;

          b.style.animationDuration = `${timing.burstMs}ms`;

      liveFirework.classList.add("show");

    function playGiftAnimation(giftId) {
      const gift = giftLibrary[giftId];
      if (!gift || !giftVideo || !giftOverlay) {
        console.log("Gift animation failed: missing elements", { gift, giftVideo: !!giftVideo, giftOverlay: !!giftOverlay });
        return;
      }
      const isAndroidDevice = /Android/i.test(navigator.userAgent);
      const useEmbeddedGiftSound = giftId === "leonandlion" || giftId === "dragon" || giftId === "zeus" || giftId === "lion" || (isAndroidDevice && giftId === "tiktokuniverse");
      const useDoubleHeightGift = giftId === "dragon" || giftId === "zeus" || giftId === "tiktokuniverse";
      const dragonStartOffsetSec = giftId === "dragon" ? 0.10 : 0;

      /* Check if this is a lion upgrade play */
      const useLionUpgrade = (giftId === 'lion' && lionUpgradeBlobUrl && !isIPhoneDevice && !isAndroidDevice);
      const skipSeparateGiftSound = (giftId === 'lion' && isAndroidDevice) || (giftId === 'tiktokuniverse' && isAndroidDevice);

      let sources = gift.sources || (gift.animation ? [gift.animation] : []);

      /* Android lion: use the bundled local webm as preferred source */
      if (giftId === 'lion' && isAndroidDevice) {
        sources = ["image/!Lion (29999).webm"];
      }

      /* Build ordered source list — upgrade blob first, then original fallbacks */
      if (useLionUpgrade) {
        sources = [lionUpgradeBlobUrl, ...sources]; // upgrade first, old as fallback
      }
      if (!useLionUpgrade && !isAndroidDevice && giftVideo && sources.length > 1) {
        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);
        const preferMP4 = isIOS; // Only iOS uses MP4; macOS Safari can play WebM
        const canPlay = (src) => {
          if (src.endsWith(".webm")) {
            if (preferMP4) return false; // iOS/Safari: skip WebM entirely, use MP4
            return !!giftVideo.canPlayType("video/webm") || !!giftVideo.canPlayType("video/webm; codecs=\"vp9\"");
          }
          if (src.endsWith(".mp4")) {
            return !!giftVideo.canPlayType("video/mp4");
          }
          return true;
        };

    function setupMicMonitorFromStream(nextStream) {
      if (!nextStream) return;
      const audioTracks = typeof nextStream.getAudioTracks === "function" ? nextStream.getAudioTracks() : [];
      if (!audioTracks.length) return;

      micAnalyser = micCtx.createAnalyser();
      micAnalyser.fftSize = 512;
      micData = new Uint8Array(micAnalyser.fftSize);

      const tick = () => {
        if (!micAnalyser || !micData) return;

        for (let i = 0; i < micData.length; i++) {
          const v = (micData[i] - 128) / 128;
          sum += v * v;

        const rms = Math.sqrt(sum / micData.length);

    function drawAiAvatar(results) {
      if (!camAiCanvas || !camAiCtx) return;
      camAiCtx.clearRect(0, 0, camAiCanvas.width, camAiCanvas.height);
      if (!camAiEnabled || !camAiAvatarReady) return;
      const faces = results && results.multiFaceLandmarks;
      if (!faces || !faces.length) return;
      const landmarks = faces[0];
      let minX = 1, minY = 1, maxX = 0, maxY = 0;
      for (const p of landmarks) {
        if (p.x < minX) minX = p.x;
        if (p.y < minY) minY = p.y;
        if (p.x > maxX) maxX = p.x;
        if (p.y > maxY) maxY = p.y;
      }
      const w = camAiCanvas.width;
      const h = camAiCanvas.height;
      const faceW = (maxX - minX) * w;
      const faceH = (maxY - minY) * h;
      const centerX = (minX + maxX) * 0.5 * w;
      const centerY = (minY + maxY) * 0.5 * h;
      const scale = 1.4;
      const drawW = faceW * scale;
      const drawH = faceH * scale;
      const x = centerX - drawW / 2;
      const y = centerY - drawH / 2;
      camAiCtx.drawImage(camAiAvatarImage, x, y, drawW, drawH);

    function initFaceMesh() {

        if (!file) return;
        setVrmEnabled(true);
        if (window.VRMController && typeof window.VRMController.loadFile === "function") {
          window.VRMController.loadFile(file);
        }
        camVrmFile.value = "";
      });
    }

    if (camVrmClearBtn) {
      camVrmClearBtn.addEventListener("click", () => {
        setVrmEnabled(false);
      });
    }

    if (camBgBtn && camBgFile) {
      camBgBtn.addEventListener("click", () => {
        camBgFile.click();
      });
      camBgFile.addEventListener("change", () => {
        const file = camBgFile.files && camBgFile.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = () => {
          if (typeof reader.result === "string") {
            setCamBackground(reader.result);
          }
          camBgFile.value = "";
        };
        reader.readAsDataURL(file);
      });
    }

    if (camBgClearBtn) {
      camBgClearBtn.addEventListener("click", () => {
        setCamBackground("");
      });
    }

    if (webBgBtn && webBgFile) {
      webBgBtn.addEventListener("click", () => {
        webBgFile.click();
      });
      webBgFile.addEventListener("change", () => {
        const file = webBgFile.files && webBgFile.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = () => {
          if (typeof reader.result === "string") {
            setWebBackground(reader.result);
          }
          webBgFile.value = "";
        };
        reader.readAsDataURL(file);
      });
    }

    if (webBgClearBtn) {
      webBgClearBtn.addEventListener("click", () => {
        setWebBackground("");
      });
    }


    function loadSeats() {
      try {
        const saved = localStorage.getItem(seatsStoreKey);
        if (!saved) return;
        const parsed = JSON.parse(saved);
        if (Array.isArray(parsed) && parsed.length === seatCount) {
          seats = parsed;
          seatColors = Array.from({ length: seatCount }, () => null);
          seats.forEach((seat, idx) => {
            if (seat && seat.avatar) computeSeatColor(idx, seat.avatar);
          });
        }
      } catch (err) { /* ignore */ }
    }

    function sendMessage(payload) {
      const message = { ...payload, ts: Date.now() };
      if (channel) {
        channel.postMessage(message);
      } else {
        localStorage.setItem(fallbackKey, JSON.stringify(message));
      }
      sendWs(message);
    }

    function handleIncoming(message) {
      if (!message || typeof message !== "object") return;
      if (!shouldProcessMessage(message)) return;
      if (message.type === "remote-command") {
        if (message.action === "open-room") updateRoomUI(true);
        if (message.action === "close-room") updateRoomUI(false);
        if (message.action === "start-camera") startCamera();
        if (message.action === "set-transparent-bg") {
          document.body.classList.toggle("transparent-bg", !!message.enabled);
        }
      } else if (message.type === "edit-mode" && typeof message.enabled === "boolean") {
        editMoveEnabled = message.enabled;
        if (animationBox) {
          animationBox.style.borderStyle = message.enabled ? "dashed" : "none";
        }
        if (fireworkBox) {
          fireworkBox.style.borderStyle = message.enabled ? "dashed" : "none";
          fireworkBox.style.pointerEvents = message.enabled ? "auto" : "none";
        }
        if (editMoveEnabled) {
          applyEditZOrder(fireworkBox || animationBox);
        } else {
          resetEditZOrder();
        }
      } else if (message.type === "save-layout") {
        try {
          localStorage.setItem(styleStoreKey, JSON.stringify({ ...roomStyle, _v: styleStoreVersion }));
        } catch (err) { /* ignore */ }
        saveLayoutToServer();
        console.log("Layout saved to localStorage + server");
      } else if (message.type === "remote-style" && message.style) {
        const { _v, ...rest } = message.style;
        roomStyle = { ...roomStyle, ...rest };
        applyRoomStyle();
      } else if (message.type === "remote-seats" && Array.isArray(message.seats)) {
        const prevSeats = Array.isArray(seats) ? seats : [];
        const incomingSeats = message.seats;
        seats = incomingSeats.map((nextSeat, i) => {
          const prevSeat = prevSeats[i] || null;
          if (!nextSeat || !prevSeat) return nextSeat;
          const prevHandle = normalizeHandle(prevSeat.handle || prevSeat.name || "");
          const nextHandle = normalizeHandle(nextSeat.handle || nextSeat.name || "");
          if (!prevHandle || !nextHandle || prevHandle !== nextHandle) return nextSeat;
          const prevPoints = Number(prevSeat.points);
          const nextPoints = Number(nextSeat.points);
          const safePrev = Number.isFinite(prevPoints) ? prevPoints : 0;
          const safeNext = Number.isFinite(nextPoints) ? nextPoints : 0;
          // Keep the larger total so stale remote-seats packets cannot roll points back.
          return { ...nextSeat, points: Math.max(safePrev, safeNext) };
        });
        seatColors = Array.from({ length: seatCount }, () => null);
        for (let i = 0; i < seatCount; i++) {
          const prev = prevSeats[i] || null;
          const next = seats[i] || null;
          const prevHandle = normalizeHandle(prev?.handle || prev?.name || "");
          const nextHandle = normalizeHandle(next?.handle || next?.name || "");
          if (!next || prevHandle !== nextHandle) {
            clearSeatGiftIcon(i);
          }
        }
        seats.forEach((seat, idx) => {
          if (seat && seat.avatar) computeSeatColor(idx, seat.avatar);
        });
        try { localStorage.setItem(seatsStoreKey, JSON.stringify(seats)); } catch (err) { /* ignore */ }
        applyRoomStyle();
      } else if (message.type === "donate-gift" && message.giftId) {
        const idx = Number(message.seatIndex);
        if (Number.isInteger(idx) && idx >= 0 && idx < seatCount && seats[idx]) {
          // Optional handle check (prevents wrong seat update if remote got out of sync)
          if (!message.seatHandle || seats[idx].handle === message.seatHandle) {
            const delta = Number(message.pointsDelta);
            const current = Number(seats[idx].points);
            const safeCurrent = Number.isFinite(current) ? current : 0;
            const safeDelta = Number.isFinite(delta) ? delta : 0;
            seats[idx].points = safeCurrent + safeDelta;
            try { localStorage.setItem(seatsStoreKey, JSON.stringify(seats)); } catch (err) { /* ignore */ }
            applyRoomStyle();
            showSeatPointsRise(idx, safeDelta);
            if (message.giftId === "lion") {
              showLionSeatIcon(idx);
            } else if (message.giftId === "leonandlion") {
              showLionSeatIcon(idx, "image/leonandlionicon.png");
            } else if (message.giftId === "zeus") {
              showLionSeatIcon(idx, "image/zeusicon.png");
            } else if (message.giftId === "dragon") {
              showLionSeatIcon(idx, "image/dragonicon.png");
            } else if (message.giftId === "pegasus") {
              showLionSeatIcon(idx, "image/pegasusicon.png");
            } else if (message.giftId === "thunderfalcon") {
              showLionSeatIcon(idx, "image/thunderfalconicon.png");
            } else if (message.giftId === "tiktokuniverse") {
              showLionSeatIcon(idx, "image/tiktokuniverseicon.webp");
            }
          }
        }
        enqueueGiftAnimation(message.giftId);
      } else if (message.type === "tiktok-live-gift") {
        const donorAvatar = message?.donor?.avatar || "";
        const giftIcon = message?.gift?.icon || "";
        enqueueLiveGiftFirework(donorAvatar, giftIcon);
      } else if (message.type === "play-gift" && message.giftId) {
        enqueueGiftAnimation(message.giftId);
      } else if (message.type === "cam-bg-updated" || message.type === "cam-bg") {
        const bgUrl = (message.dataUrl != null) ? message.dataUrl : (localStorage.getItem(camBgStoreKey) || "");
        setCamBackground(typeof bgUrl === "string" ? bgUrl : "");
      } else if (message.type === "web-bg") {
        const bgUrl = (message.dataUrl != null) ? message.dataUrl : "";
        setWebBackground(typeof bgUrl === "string" ? bgUrl : "");
      } else if (message.type === "toggle-camera") {
        toggleCameraFacing();
      } else if (message.type === "cam-tools" && typeof message.visible === "boolean") {
        setCamToolsVisible(message.visible);
      } else if (message.type === "web-bg-tools" && typeof message.visible === "boolean") {
        setWebBgToolsVisible(message.visible);
      } else if (message.type === "cam-visibility" && typeof message.visible === "boolean") {
        setCamVisible(message.visible);
      } else if (message.type === "host-text-visibility" && typeof message.visible === "boolean") {
        const hp = document.getElementById("hostPill");
        if (hp) hp.style.display = message.visible ? "" : "none";
      } else if (message.type === "cam-name-text" && typeof message.text === "string") {
        const cp = document.getElementById("camNamePill");
        if (cp) cp.textContent = (message.text || "").trim() || "Host";
      } else if (message.type === "cam-name-visibility" && typeof message.visible === "boolean") {
        const cp = document.getElementById("camNamePill");
        if (cp) cp.style.display = message.visible ? "" : "none";
      } else if (message.type === "cam-name-capsule-visibility" && typeof message.visible === "boolean") {
        const cp = document.getElementById("camNamePill");
        if (cp) cp.classList.toggle("no-capsule", !message.visible);
      } else if (message.type === "speaking-border-visibility" && typeof message.visible === "boolean") {
        speakingBorderVisible = message.visible;
        if (!speakingBorderVisible && videoWrap) videoWrap.classList.remove("cam-speaking");
      } else if (message.type === "vrm-default") {
        setVrmEnabled(true);
        if (window.VRMController && typeof window.VRMController.load === "function") {
          window.VRMController.load("vrm/vrm2.vrm");
        }
      } else if (message.type === "vrm-load" && typeof message.url === "string") {
        setVrmEnabled(true);
        if (window.VRMController && typeof window.VRMController.load === "function") {
          window.VRMController.load(message.url);
        }
      } else if (message.type === "vrm-pose" && typeof message.strong === "boolean") {
        setVrmEnabled(true);
        if (window.VRMController && typeof window.VRMController.setPoseStrong === "function") {
          window.VRMController.setPoseStrong(message.strong);
        }
      } else if (message.type === "vrm-pose-angle" && message.angle != null) {
        setVrmEnabled(true);
        if (window.VRMController && typeof window.VRMController.setPoseAngle === "function") {
          window.VRMController.setPoseAngle(message.angle);
        }
      } else if (message.type === "animation-box-visibility" && message.visible !== undefined) {
        if (animationBox) {
          animationBox.style.borderStyle = (message.visible && editMoveEnabled) ? "dashed" : "none";
        }
        if (fireworkBox) {
          fireworkBox.style.borderStyle = (message.visible && editMoveEnabled) ? "dashed" : "none";
        }
      } else if (message.type === "auto-gift-config" && message.config) {
        autoGiftConfig = normalizeAutoGiftConfig(message.config);
        updateAutoGiftLoop();
      } else if (message.type === "seat-style" && message.style != null) {
        const nextStyle = Number(message.style);
        if (nextStyle === 1 || nextStyle === 2) {
          seatStyleMode = nextStyle;
          try { localStorage.setItem(seatStyleModeKey, seatStyleMode); } catch(e) {}
          applyRoomStyle();
          if (editMoveEnabled) {
            applyEditZOrder(roomPanel || videoWrap || animationBox);
          }
          updateRoomUI(roomOpen);
        }
      }
    }

    function enableDragResize(el, keyPrefix) {
      let mode = null;
      let startX = 0;
      let startY = 0;
      let startW = 0;
      let startH = 0;
      let startOX = 0;
      let startOY = 0;
      let startScale = 100;
      let pinchMode = false;
      let pinchStartDist = 0;
      let pinchStartW = 0;
      let pinchStartH = 0;
      let pinchStartOX = 0;
      let pinchStartOY = 0;
      const minSize = 160;
      const minHeight = 120;

      function resolveKeyPrefix() {
        if (keyPrefix === "cam" && (!roomOpen || seatStyleMode === 2)) return "closedCam";
        return keyPrefix;
      }

      /* For room + style 2, offsets use separate keys but width/height stay shared */
      function oKey(suffix) {
        if (keyPrefix === "room" && seatStyleMode === 2) {
          if (suffix === "OffsetX") return "roomOffsetX2";
          if (suffix === "OffsetY") return "roomOffsetY2";
        }
        return resolveKeyPrefix() + suffix;
      }

      function getTouchDistance(t1, t2) {
        const dx = t2.clientX - t1.clientX;
        const dy = t2.clientY - t1.clientY;
        return Math.sqrt(dx * dx + dy * dy);
      }

      function onPointerMove(e) {
        const activePrefix = resolveKeyPrefix();
        const dx = e.clientX - startX;
        const dy = e.clientY - startY;
        if (mode === "move") {
          roomStyle[oKey("OffsetX")] = startOX + dx;
          roomStyle[oKey("OffsetY")] = startOY + dy;
        } else if (mode === "resize") {
          if (keyPrefix === "room") {
            /* Room edge-drag → change scale % instead of pixel dimensions */
            const widthDelta = (resizeRight ? dx : 0) + (resizeLeft ? -dx : 0);
            const heightDelta = (resizeBottom ? dy : 0) + (resizeTop ? -dy : 0);
            const domDelta = Math.abs(widthDelta) >= Math.abs(heightDelta) ? widthDelta : heightDelta;
            const ratio = startW > 0 ? Math.max(0.05, (startW + domDelta) / startW) : 1;
            const newScale = Math.min(300, Math.max(30, Math.round(startScale * ratio)));
            if (seatStyleMode === 2) {
              roomStyle.roomScale2 = newScale;
            } else {
              roomStyle.roomScale1 = newScale;
            }
            /* Keep the opposite edge anchored: compensate offset by the visual size change */
            const scaleDelta = newScale - startScale;
            if (resizeTop)  roomStyle[oKey("OffsetY")] = startOY - startH * scaleDelta / 100;
            if (resizeLeft) roomStyle[oKey("OffsetX")] = startOX - startW * scaleDelta / 100;
          } else {
            const widthDelta = (resizeRight ? dx : 0) + (resizeLeft ? -dx : 0);
            const heightDelta = (resizeBottom ? dy : 0) + (resizeTop ? -dy : 0);
            const nextW = Math.max(minSize, startW + widthDelta);
            const nextH = Math.max(minHeight, startH + heightDelta);
            roomStyle[activePrefix + "Width"] = nextW;
            roomStyle[activePrefix + "Height"] = nextH;
            if (resizeLeft) roomStyle[oKey("OffsetX")] = startOX + dx;
            if (resizeTop) roomStyle[oKey("OffsetY")] = startOY + dy;
          }
        }
        applyRoomStyle();
        broadcastCurrentStyle("host-drag");
      }

      function onPointerUp() {
        mode = null;
        window.removeEventListener("pointermove", onPointerMove);
        window.removeEventListener("pointerup", onPointerUp);
      }

      let resizeLeft = false;
      let resizeRight = false;
      let resizeTop = false;
      let resizeBottom = false;

      el.addEventListener("pointerdown", (e) => {
        if (!editMoveEnabled) return;
        const activePrefix = resolveKeyPrefix();
        const rect = el.getBoundingClientRect();
        const edge = 12;
        resizeLeft = e.clientX <= rect.left + edge;
        resizeRight = e.clientX >= rect.right - edge;
        resizeTop = e.clientY <= rect.top + edge;
        resizeBottom = e.clientY >= rect.bottom - edge;
        const isResize = resizeLeft || resizeRight || resizeTop || resizeBottom;
        mode = isResize ? "resize" : "move";
        startX = e.clientX;
        startY = e.clientY;
        startW = roomStyle[activePrefix + "Width"] || el.offsetWidth;
        startH = roomStyle[activePrefix + "Height"] || el.offsetHeight;
        startOX = roomStyle[oKey("OffsetX")] || 0;
        startOY = roomStyle[oKey("OffsetY")] || 0;
        if (keyPrefix === "room") {
          startScale = seatStyleMode === 2 ? (roomStyle.roomScale2 ?? 100) : (roomStyle.roomScale1 ?? 100);
        }
        window.addEventListener("pointermove", onPointerMove);
        window.addEventListener("pointerup", onPointerUp);
      });

      // Pinch-to-resize for touch devices
      el.addEventListener("touchstart", (e) => {
        if (!editMoveEnabled) return;
        if (e.touches.length !== 2) return;
        const activePrefix = resolveKeyPrefix();
        pinchMode = true;
        pinchStartDist = getTouchDistance(e.touches[0], e.touches[1]);
        pinchStartW = roomStyle[activePrefix + "Width"] || el.offsetWidth;
        pinchStartH = roomStyle[activePrefix + "Height"] || el.offsetHeight;
        pinchStartOX = roomStyle[oKey("OffsetX")] || 0;
        pinchStartOY = roomStyle[oKey("OffsetY")] || 0;
      }, { passive: true });

      el.addEventListener("touchmove", (e) => {
        if (!editMoveEnabled || !pinchMode) return;
        if (e.touches.length !== 2) return;
        const activePrefix = resolveKeyPrefix();
        const dist = getTouchDistance(e.touches[0], e.touches[1]);
        if (!pinchStartDist) return;
        const scale = dist / pinchStartDist;
        const nextW = Math.max(minSize, Math.round(pinchStartW * scale));
        const nextH = Math.max(minHeight, Math.round(pinchStartH * scale));
        roomStyle[activePrefix + "Width"] = nextW;
        roomStyle[activePrefix + "Height"] = nextH;
        roomStyle[oKey("OffsetX")] = pinchStartOX + Math.round((pinchStartW - nextW) / 2);
        roomStyle[oKey("OffsetY")] = pinchStartOY + Math.round((pinchStartH - nextH) / 2);
        applyRoomStyle();
        broadcastCurrentStyle("host-pinch");
      }, { passive: true });

      el.addEventListener("touchend", () => {
        pinchMode = false;
      }, { passive: true });
    }

    function initChannel() {
      if (channel) {
        channel.addEventListener("message", (event) => handleIncoming(event.data));
      } else {
        window.addEventListener("storage", (event) => {
          if (event.key === fallbackKey && event.newValue) {
            try { handleIncoming(JSON.parse(event.newValue)); } catch (err) { /* ignore */ }
          }
        });
      }
      // Listen for direct localStorage writes (cam bg is stored directly by Mode 2)
      window.addEventListener("storage", (event) => {
        if (event.key === camBgStoreKey) {
          setCamBackground(event.newValue || "");
        }
      });
      sendMessage({ type: "hello" });
    }

    buildRoomSlots();
    loadSeats();
    // Load layout from server first, fall back to localStorage
    (async function loadSavedLayout() {
      let loaded = await loadLayoutFromServer();
      if (!loaded) {
        try {
          const saved = localStorage.getItem(styleStoreKey);
          if (saved) {
            const parsed = JSON.parse(saved);
            if (parsed && typeof parsed === "object" && parsed._v === styleStoreVersion) {
              const { _v, ...rest } = parsed;
              roomStyle = { ...roomStyle, ...rest };
            }
          }
        } catch (err) { /* ignore */ }
      }
      applyRoomStyle();
      updateRoomUI(roomOpen);
    })();
    enableDragResize(videoWrap, "cam");
    enableDragResize(roomPanel, "room");
    enableDragResize(animationBox, "animation");
    enableDragResize(fireworkBox, "firework");
    initChannel();
    // preloadGiftAssets is called after requireLogin succeeds
    // After init, broadcast mode1's actual layout so mode2 sliders stay in sync
    setTimeout(() => broadcastCurrentStyle("host-init"), 500);
    try {
      const savedFacing = localStorage.getItem(camFacingStoreKey);
      if (savedFacing === "user" || savedFacing === "environment") currentFacingMode = savedFacing;
    } catch (err) { /* ignore */ }
    try {
      if (!camBgLoadedFromServer) {
        const savedBg = localStorage.getItem(camBgStoreKey);
        if (savedBg) setCamBackground(savedBg);
      }
    } catch (err) { /* ignore */ }
    try {
      const savedWebBg = localStorage.getItem(webBgStoreKey);
      if (savedWebBg === null) {
        setWebBackground(defaultWebBgUrl, false);
      } else {
        setWebBackground(savedWebBg, false);
      }
    } catch (err) {
      setWebBackground(defaultWebBgUrl, false);
    }
    startCamera();
    startMicMonitor();
    positionGiftOverlay();
    window.addEventListener("resize", positionGiftOverlay);
    window.addEventListener("resize", applyRoomStyle);
    if (preferredMode === "host") {
      // already in host mode
    }
  </script>
</body>
</html>
