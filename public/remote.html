<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dubai Live - Kontrol Paneli</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        :root { --neon: #5dd1ff; --danger: #ff4757; --bg: #0a0a0b; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; touch-action: manipulation; }
        .header { border-bottom: 2px solid var(--neon); padding-bottom: 10px; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 25px; }
        button { 
            padding: 18px 10px; border-radius: 12px; border: 1px solid #333; background: #1a1a1c;
            color: white; font-weight: bold; font-size: 14px; transition: 0.2s; cursor: pointer;
        }
        button:active { transform: scale(0.95); background: var(--neon); color: black; }
        .gift { border-color: var(--danger); color: var(--danger); }
        .gift:active { background: var(--danger); color: white; }
        .seat { border-color: #7bed9f; color: #7bed9f; }
        .seat:active { background: #7bed9f; color: black; }
        .status { font-size: 12px; color: #888; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="header">
        <h2 style="margin:0; color: var(--neon);">DUBAI REMOTE</h2>
        <div id="connectionStatus" class="status">Sunucuya bağlanılıyor...</div>
    </div>

    <h3 style="color: var(--danger); font-size: 16px;">🎁 ÖZEL EFEKTLER</h3>
    <div class="grid">
        <button class="gift" onclick="send('LION')">🦁 ASLAN ÇIKAR</button>
        <button class="gift" onclick="send('GIFT_BOX')">🎁 HEDİYE KUTUSU</button>
        <button class="gift" onclick="send('ZEUS')">⚡ ZEUS GÜCÜ</button>
        <button class="gift" onclick="send('DRAGON')">🐉 EJDERHA</button>
    </div>

    <h3 style="color: #7bed9f; font-size: 16px;">🪑 KOLTUK YÖNETİMİ</h3>
    <div class="grid">
        <button class="seat" onclick="send('SEAT_1')">Koltuk 1</button>
        <button class="seat" onclick="send('SEAT_2')">Koltuk 2</button>
        <button class="seat" onclick="send('SEAT_3')">Koltuk 3</button>
        <button class="seat" onclick="send('SEAT_4')">Koltuk 4</button>
        <button class="seat" onclick="send('SEAT_5')">Koltuk 5</button>
        <button class="seat" onclick="send('SEAT_6')">Koltuk 6</button>
        <button class="seat" onclick="send('SEAT_7')">Koltuk 7</button>
        <button class="seat" onclick="send('SEAT_8')">Koltuk 8</button>
    </div>

    <button style="width:100%; margin-top:20px; border-color:#f1c40f; color:#f1c40f;" onclick="send('RESET')">♻️ TÜMÜNÜ SIFIRLA</button>

    <script>
        // Railway canlı linkine otomatik bağlanır
        const socket = io('https://dubai-live-production.up.railway.app');

        const statusEl = document.getElementById('connectionStatus');

        socket.on('connect', () => {
            statusEl.textContent = '● Bağlı (Railway Canlı)';
            statusEl.style.color = '#7bed9f';
        });

        socket.on('disconnect', () => {
            statusEl.textContent = '○ Bağlantı Kesildi!';
            statusEl.style.color = 'var(--danger)';
        });

        function send(cmd) {
            // Host.html dosyanın beklediği veri yapısı
            socket.emit('remote-command', {
                type: cmd,
                value: true,
                timestamp: Date.now()
            });
            
            // Telefon titreşimi (varsa)
            if (navigator.vibrate) navigator.vibrate(50);
        }
    </script>
</body>
</html>
